name: Publish Topogram Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional package version. When supplied, it must match package.json."
        required: false
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: string
      create_tag:
        description: "Create and push topogram-hello-v<version> after publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish @attebury/topogram-hello
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: attebury/topogram
          ref: topogram-v0.2.22
          path: topogram-source
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@attebury"
      - name: Check release version
        env:
          EXPECTED_TOPOGRAM_HELLO_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ -n "$EXPECTED_TOPOGRAM_HELLO_VERSION" && "$EXPECTED_TOPOGRAM_HELLO_VERSION" != "$VERSION" ]]; then
            echo "Requested publish version $EXPECTED_TOPOGRAM_HELLO_VERSION does not match package version $VERSION." >&2
            exit 1
          fi
      - name: Pack Topogram CLI from source
        id: topogram_cli
        run: |
          npm --prefix ./topogram-source/engine ci
          mkdir -p "$RUNNER_TEMP/topogram-cli"
          PACK_NAME="$(cd ./topogram-source/engine && npm pack --silent --pack-destination "$RUNNER_TEMP/topogram-cli" | tail -n 1)"
          echo "tarball=$RUNNER_TEMP/topogram-cli/$PACK_NAME" >> "$GITHUB_OUTPUT"
      - name: Verify package
        env:
          TOPOGRAM_CLI_PACKAGE_SPEC: ${{ steps.topogram_cli.outputs.tarball }}
        run: npm run pack:check
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --tag "${{ inputs.dist_tag }}"
      - name: Create release tag
        if: ${{ inputs.create_tag }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="topogram-hello-v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $TAG" >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"
