name: Publish Topogram Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional package version. When supplied, it must match package.json."
        required: false
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: string
      create_tag:
        description: "Create and push topogram-hello-v<version> after publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish @topogram/topogram-hello
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@topogram"
      - name: Check release version
        env:
          EXPECTED_TOPOGRAM_HELLO_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ -n "$EXPECTED_TOPOGRAM_HELLO_VERSION" && "$EXPECTED_TOPOGRAM_HELLO_VERSION" != "$VERSION" ]]; then
            echo "Requested publish version $EXPECTED_TOPOGRAM_HELLO_VERSION does not match package version $VERSION." >&2
            exit 1
          fi
      - name: Verify package
        run: |
          TOPOGRAM_CLI_VERSION="$(cat topogram-cli.version)"
          TOPOGRAM_CLI_PACKAGE_SPEC="@topogram/cli@$TOPOGRAM_CLI_VERSION" npm run pack:check
      - name: Publish package
        run: npm publish --provenance --access public --tag "${{ inputs.dist_tag }}"
      - name: Create release tag
        if: ${{ inputs.create_tag }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="topogram-hello-v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $TAG" >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"
